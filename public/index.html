<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <title>Notifier</title>
</head>
<body>
  <h1>Notifier</h1>
  <button id="subscribe">Enable Notifications</button>
  <pre id="output"></pre>
  <script>
    const VAPID_PUBLIC_KEY = 'BALavMy21m6usuw5-iaaDvJiAbUuln7SV72x5F5rZtO7kLk2vUu8EXQ53XB1whea5cTEUG8vN1f2BgHVPwQvhUE';

    document.getElementById('subscribe').addEventListener('click', async () => {
      try {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') throw new Error('Notification permission ' + perm);
        const reg = await navigator.serviceWorker.register('sw.js');
        await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: VAPID_PUBLIC_KEY
        });
        const json = JSON.stringify(sub, null, 2);
        document.getElementById('output').textContent = json;
      } catch (err) {
        document.getElementById('output').textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
