<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Permission Test</title>
</head>
<body>
  <h1>Permission Test (v2)</h1>
  <p>Current status: <span id="status"></span></p>
  <button id="ask">Request Permission</button>
  <button id="vibrate">Test Vibrate (API)</button>
  <button id="notify">Test Notification w/ Vibrate</button>
  <pre id="output"></pre>
  <script>
    document.getElementById('status').textContent = Notification.permission;
    document.getElementById('ask').addEventListener('click', async () => {
      const result = await Notification.requestPermission();
      document.getElementById('output').textContent = 'Result: ' + result;
      document.getElementById('status').textContent = Notification.permission;
    });
    document.getElementById('vibrate').addEventListener('click', () => {
      const result = navigator.vibrate([500, 200, 500]);
      document.getElementById('output').textContent = 'navigator.vibrate returned: ' + result;
    });
    document.getElementById('notify').addEventListener('click', () => {
      new Notification('Vibrate Test (v2)', {
        body: 'This should vibrate (v2)',
        vibrate: [500, 200, 500]
      });
      document.getElementById('output').textContent = 'Notification created';
    });
  </script>
</body>
</html>
